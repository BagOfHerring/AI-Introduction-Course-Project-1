# gbp_mpc_params.yaml
horizon_steps: 5
lock_horizon: 0.05
safe_margin: 0.1
buffer_rate: 500
gbp_iters: 1
damp_value: 0.0

# 精度与阈值参数
obstacle_precision: 10000.0
interarm_precision: 10000.0
start_position_precision: 5000.0
start_velocity_precision: 2000.0
target_position_precision: 1000.0
target_velocity_precision: 1000.0
state_precision: 500.0
state_safety: 0.001
min_iter_relin: 1
relin_thre: 0.00001

# SSA 相关参数
is_ssa: true
ssa_ks: 20.0
z_precision_vel: 1000.0
smooth_alpha: 20.0

# 控制极值系数
vmax_coeff: 0.3
amax_coeff: 0.3
